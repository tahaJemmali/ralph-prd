# ralph.config.yaml — copy this file to ralph.config.yaml and edit as needed.
#
# Ralph looks for ralph.config.yaml next to ralph-claude.mjs.
# If the file is absent, Ralph defaults to the current working directory
# as the single repo and uses all flag defaults.

# ── Repositories ──────────────────────────────────────────────────────────────
# List every git repo Ralph is allowed to read and write.
# Paths are relative to this config file.
# repos:
#   - name: backend
#     path: ../backend
#   - name: frontend
#     path: ../frontend


# ── Extra writable directories ────────────────────────────────────────────────
# Directories that are not git roots but Ralph may write to (e.g. shared docs).
# Paths are relative to this config file.

# writableDirs:
#   - ../../docs

# ── Flags ─────────────────────────────────────────────────────────────────────
# All flags default to false / their built-in default.
# CLI flags (--send-it, etc.) always override what is set here.

flags:
  # Claude skips self-committing; a separate commit step runs instead —
  # so the git history looks like you did all the work. Sneaky.
  iDidThis: false

  # After all phases complete, push the branch to origin and open a PR
  # via `gh pr create`. Requires the GitHub CLI to be installed.
  sendIt: false

  # Pause and wait for you to press Enter before each commit step.
  # Useful when you want to review diffs before anything is committed.
  waitForIt: false

  # Maximum number of repair → re-verify cycles per phase before Ralph
  # gives up and exits. Increase if your phases are complex and need
  # more attempts to pass all acceptance criteria.
  maxRepairs: 3

  # Log level controls what gets written to disk.
  #   none      — no log files at all
  #   necessary — verdicts (pass/fail), missed criteria, phase progress (default)
  #   dump      — full streamed model output (verbose)
  logLevel: necessary

  # Skip the post-commit ship-check step for every phase. Set to true if you
  # have not installed a ship-check skill or want to disable the review gate.
  # CLI equivalent: --skip-ship-check
  skipShipCheck: false

  # Max ship-check attempts per phase before giving up. On final failure,
  # behaviour is controlled by skipOnShipCheckFail below.
  # CLI equivalent: --ship-check-retries=N
  shipCheckRetries: 1

  # When true, log and continue if ship-check fails after all retries instead
  # of hard-stopping. Defaults to true.
  # CLI equivalent: --skip-on-ship-check-fail
  skipOnShipCheckFail: true

  # When all repair attempts are exhausted, skip verification and continue to
  # the commit step instead of hard-stopping. Useful when the acceptance
  # criteria require external credentials or manual steps that the agent cannot
  # perform. Defaults to false (hard stop).
  # CLI equivalent: --skip-on-verify-fail
  skipOnVerifyFail: false
